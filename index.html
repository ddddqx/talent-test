<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天赋探测站 · Talent Discovery</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ===== 首页英雄区 ===== -->
  <section class="hero" id="heroSection">
    <div class="hero-bg">
      <div class="float-icon icon-1">🧠</div>
      <div class="float-icon icon-2">🎨</div>
      <div class="float-icon icon-3">💬</div>
      <div class="float-icon icon-4">🧭</div>
      <div class="float-icon icon-5">🤝</div>
      <div class="float-icon icon-6">✨</div>
    </div>
    <div class="container hero-content">
      <div class="hero-badge">✨ 发现你的隐藏天赋</div>
      <h1>天赋<span class="highlight">探测</span>站</h1>
      <p class="hero-sub">12 道趣味选择题，从逻辑、创造、语言、空间、动手、社交<br>六个维度挖掘你潜藏的天赋能力</p>
      <div class="hero-features">
        <span>🧠 逻辑思维</span>
        <span>🎨 创造力</span>
        <span>💬 语言天赋</span>
        <span>🧭 空间智能</span>
        <span>🤝 社交情商</span>
        <span>👐 动手实践</span>
      </div>
      <button class="btn btn-start" id="startBtn">
        <i class="fas fa-rocket"></i> 开始探测
      </button>
    </div>
  </section>

  <!-- ===== 测试区 ===== -->
  <section class="quiz-section" id="quizSection" style="display:none;">
    <div class="container">
      <div class="quiz-header">
        <div class="quiz-progress">
          <span class="progress-text" id="progressText">第 1 / 12 题</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div class="quiz-dimension" id="dimensionLabel">
          <span class="dimension-icon" id="dimIcon">🧠</span>
          <span class="dimension-name" id="dimName">逻辑思维</span>
        </div>
      </div>

      <div class="quiz-card" id="quizCard">
        <p class="quiz-question" id="questionText">加载中...</p>
        <div class="quiz-options" id="optionsContainer"></div>
      </div>
    </div>
  </section>

  <!-- ===== 结果区 ===== -->
  <section class="result-section" id="resultSection" style="display:none;">
    <div class="container">
      <div class="result-header">
        <h2>✨ 你的天赋报告</h2>
        <p class="result-subtitle" id="resultSubtitle">基于你的选择，我们发现了你的天赋倾向</p>
      </div>

      <!-- 雷达图 -->
      <div class="radar-container">
        <canvas id="radarCanvas" width="400" height="400"></canvas>
      </div>

      <!-- 天赋排行 -->
      <div class="talent-rankings" id="talentRankings"></div>

      <!-- 天赋解读 -->
      <div class="talent-interpretation" id="interpretation"></div>

      <!-- 分享 -->
      <div class="share-section">
        <p>分享给朋友，看看他们的天赋是什么！</p>
        <div class="share-buttons">
          <button class="btn btn-share" id="restartBtn">
            <i class="fas fa-redo"></i> 再测一次
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="container">
      <p>✨ 天赋探测站 · 每个人都是独一无二的天才</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
